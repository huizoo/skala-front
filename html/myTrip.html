<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나의 여행지</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header>
      <h1>나의 여행 앨범</h1>
      <audio src="../media/music.mp3" controls autoplay></audio>
    </header>
    <main>
      <section>
        <figure>
          <img
            src="../media/리장.jpg"
            alt="리장 호도협(2025년)"
            style="width: 300px"
          />
          <figcaption>리장 호도협(2025년)</figcaption>
        </figure>
        <figure>
          <img
            src="../media/세부.jpg"
            alt="세부 탑스힐(2024년)"
            style="width: 300px"
          />
          <figcaption>세부 탑스힐(2024년)</figcaption>
        </figure>
        <figure>
          <img
            src="../media/홋카이도.jpg"
            alt="홋카이도 대설산(2025년)"
            style="width: 300px"
          />
          <figcaption>홋카이도 대설산(2025년)</figcaption>
        </figure>
      </section>
      <section>
        <figure>
          <video src="../media/video.mp4" controls style="width: 300px"></video>
          <figcaption>리장의 아름다운 음악</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
