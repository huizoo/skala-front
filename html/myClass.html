<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나의 강의 일정</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🗓️ 나의 강의 시간표</h1>
      </header>
      <main>
        <table>
          <thead>
            <tr>
              <th>시간</th>
              <th>월요일</th>
              <th>화요일</th>
              <th>수요일</th>
              <th>목요일</th>
              <th>금요일</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>09:00 - 10:00</td>
              <td rowspan="3">수업1</td>
              <td rowspan="3">수업1</td>
              <td rowspan="3">수업1</td>
              <td rowspan="3">수업1</td>
              <td rowspan="3">수업1</td>
            </tr>
            <tr>
              <td>10:00 - 11:00</td>
            </tr>
            <tr>
              <td>11:00 - 12:00</td>
            </tr>
            <tr>
              <td>12:00 - 13:00</td>
              <td colspan="5">점 심 시 간</td>
            </tr>
            <tr>
              <td>13:00 - 14:00</td>
              <td rowspan="4">수업2</td>
              <td rowspan="3">수업2</td>
              <td rowspan="4">수업2</td>
              <td rowspan="3">수업2</td>
              <td rowspan="4">수업2</td>
            </tr>
            <tr>
              <td>14:00 - 15:00</td>
            </tr>
            <tr>
              <td>15:00 - 16:00</td>
            </tr>
            <tr>
              <td>16:00 - 17:00</td>
              <td rowspan="2">수업3</td>
              <td rowspan="2">수업3</td>
            </tr>
            <tr>
              <td>17:00 - 18:00</td>
              <td>수업3</td>
              <td>수업3</td>
              <td>수업3</td>
            </tr>
          </tbody>
        </table>
      </main>
    </div>
  </body>
</html>
