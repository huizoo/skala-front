<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나의 여행지</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>나의 여행 앨범</h1>
        <audio src="../media/music.mp3" controls autoplay></audio>
      </header>
      <main>
        <section>
          <h2>여행 사진</h2>
          <figure class="trip-card">
            <img src="../media/리장.jpg" alt="리장 호도협(2025년)" />
            <figcaption>리장 호도협(2025년)</figcaption>
          </figure>
          <figure class="trip-card">
            <img src="../media/세부.jpg" alt="세부 탑스힐(2024년)" />
            <figcaption>세부 탑스힐(2024년)</figcaption>
          </figure>
          <figure class="trip-card">
            <img src="../media/홋카이도.jpg" alt="홋카이도 대설산(2025년)" />
            <figcaption>홋카이도 대설산(2025년)</figcaption>
          </figure>
        </section>
        <section>
          <h2>나의 여행 브이로그</h2>
          <figure class="trip-card">
            <video src="../media/video.mp4" controls></video>
            <figcaption>리장의 아름다운 음악</figcaption>
          </figure>
        </section>
      </main>
    </div>
  </body>
</html>
