<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <ul id="menu">
      <li><button data-value="HTML">HTML</button></li>
      <li><button data-value="CSS">CSS</button></li>
      <li><button data-value="JavaScript">JavaScript</button></li>
    </ul>
    <script>
      function delay(ms) {
        return new Promise((resolve) => {
          setTimeout(resolve, ms);
        });
      }

      async function run() {
        console.log("run 시작");

        await delay(1000);

        console.log("run 끝");
      }

      console.log("A");
      run();
      console.log("B");
    </script>
  </body>
</html>
