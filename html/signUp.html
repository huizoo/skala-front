<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 - SKALA</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="layout-container site-header__inner">
        <a class="site-brand" href="./index.html" aria-label="HEEJU 홈">HEEJU<span>.</span></a>
        <nav class="site-nav" aria-label="주요 메뉴">
          <ul>
            <li><a href="./myProfile.html">프로필</a></li>
            <li><a href="./myClass.html">수업</a></li>
            <li><a href="./holiday.html">휴일</a></li>
            <li><a href="./myTrip.html">여행</a></li>
            <li><a href="./signUp.html" aria-current="page">회원가입</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="layout-container">
      <main class="page-main page-main--narrow">
        <header class="page-heading">
          <p class="eyebrow">JOIN SKALA-FRONT</p>
          <h1>회원가입</h1>
          <p>SKALA-FRONT 회원가입을 환영합니다.</p>
        </header>

        <form class="signup-form" action="signUpResult.html" method="get">
          <fieldset>
            <legend>계정 정보</legend>
            <div class="form-field">
              <label for="userId">아이디</label>
              <input
                type="text"
                id="userId"
                name="userId"
                minlength="4"
                maxlength="15"
                placeholder="4~15자 영문/숫자"
                autocomplete="username"
                required
              />
              <small class="form-hint">필수 · 4~15자 영문 또는 숫자</small>
            </div>
            <div class="form-field">
              <label for="userPw">비밀번호</label>
              <input
                type="password"
                id="userPw"
                name="userPw"
                minlength="8"
                placeholder="8자 이상 입력"
                autocomplete="new-password"
                required
              />
              <small class="form-hint">필수 · 8자 이상</small>
            </div>
            <div class="form-field">
              <label for="userEmail">이메일</label>
              <div class="form-email">
                <input type="text" id="userEmail" name="userEmail" placeholder="example" autocomplete="email" />
                <span aria-hidden="true">@</span>
                <select id="emailDomain" name="emailDomain" aria-label="이메일 도메인">
                  <option value="direct">직접 입력</option>
                  <option value="naver.com">naver.com</option>
                  <option value="gmail.com">gmail.com</option>
                  <option value="daum.net">daum.net</option>
                </select>
              </div>
            </div>
          </fieldset>

          <fieldset>
            <legend>개인 프로필 정보</legend>
            <div class="form-field">
              <label for="userName">이름</label>
              <input type="text" id="userName" name="userName" autocomplete="name" />
            </div>
            <div class="form-field">
              <label for="userBirth">생년월일</label>
              <input type="date" id="userBirth" name="userBirth" />
            </div>
            <div class="form-field">
              <span class="form-label">성별</span>
              <div class="choice-group">
              <label
                ><input
                  type="radio"
                  name="gender"
                  value="male"
                  checked
                />남성</label
              >
              <label
                ><input type="radio" name="gender" value="female" />여성</label
              >
              <label
                ><input
                  type="radio"
                  name="gender"
                  value="none"
                />선택안함</label
              >
              </div>
            </div>
            <div class="form-field">
              <span class="form-label">관심 분야 <small>(중복 선택 가능)</small></span>
              <div class="choice-group choice-group--stacked">
              <label
                ><input type="checkbox" name="interest" value="frontend" />웹
                프론트엔드 (Vue.js/HTML)</label
              >
              <label
                ><input type="checkbox" name="interest" value="uiux" />UI/UX
                디자인 표준</label
              >
              <label
                ><input type="checkbox" name="interest" value="backend" />백엔드
                & 데이터베이스</label
              >
              <label
                ><input
                  type="checkbox"
                  name="interest"
                  value="devops"
                />클라우드 & 인프라</label
              >
              </div>
            </div>
            <div class="form-field">
              <label for="subscription">가입 경로</label>
              <select id="subscription" name="subscription">
                <option value="">-- 선택해주세요 --</option>
                <option value="SNS">SNS</option>
                <option value="카페">카페</option>
                <option value="검색">검색</option>
                <option value="지인 추천">지인 추천</option>
                <option value="기타">기타</option>
              </select>
            </div>
          </fieldset>

          <fieldset>
            <legend>자기소개</legend>
            <div class="form-field">
              <label for="userIntro"
                >나를 표현하는 한 줄 소개 또는 가입 인사</label
              >
              <textarea
                id="userIntro"
                name="userIntro"
                rows="5"
                maxlength="200"
                placeholder="여기에 내용을 입력하세요 (최대 200자)"
              ></textarea>
            </div>
          </fieldset>

          <div class="form-actions">
            <input type="submit" value="동의하고 회원가입" />
            <input type="reset" value="다시 작성" />
          </div>
        </form>
      </main>
    </div>

    <footer class="site-footer">
      <div class="layout-container site-footer__inner">
        <p class="site-brand">HEEJU<span>.</span></p>
        <div class="site-footer__meta">
          <a href="mailto:ajtwlsgmlwn@naver.com">AJTWLSGMLWN@NAVER.COM</a
          ><small>© 2026 김희주 포트폴리오</small>
        </div>
      </div>
    </footer>
    <script src="../script/backToTop.js"></script>
  </body>
</html>
